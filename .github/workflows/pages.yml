name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.64

      - name: Build WASM
        run: |
          chmod +x webapp/scripts/build_wasm.sh
          ./webapp/scripts/build_wasm.sh

      - name: Stage site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude wasm \
            --exclude scripts \
            --exclude README.md \
            webapp/ _site/
          test -f _site/nodruma.js
          test -f _site/nodruma.wasm
          test -f _site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
